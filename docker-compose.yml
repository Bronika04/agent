version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: postgres-dev
    restart: always
    environment:
      POSTGRES_USER: garvbarthwal
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: vibe
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: